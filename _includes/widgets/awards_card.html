<div class="row mt-3">
    <div class="col">
        <div class="card border-0 shadow-sm bg-white">
            <div class="card-body p-4">

                <h5>Awards & Honors</h5>

                <ul>
                {% for item in site.data.profile.awards %}
                    <li>
                        <strong>{{ item.name }}</strong>
                        {% if item.date %}
                        ({{ item.date }})
                        {% endif %}
                    </li>
                {% endfor %}
                </ul>

            </div>
        </div>
    </div>
</div>

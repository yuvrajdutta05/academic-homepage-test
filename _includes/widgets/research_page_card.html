<div class="card border-0 shadow-sm bg-white">
    <div class="card-body">

        <h4>Ongoing Research</h4>

        {% for item in site.data.research.ongoing %}
            <div>
                <strong>{{ item.title }}</strong><br>
                {{ item.supervisor }}<br>
                {{ item.description }}
                <hr>
            </div>
        {% endfor %}

    </div>
</div>

ongoing:

  - year: 2026
    title: "Asymptotic Fluctuations in Cubic Interaction Spin Models"
    supervisor: "Prof. Sumit Mukherjee (Columbia University)"
    description: >
      Derived concentration inequalities for linear functionals in cubic interaction spin models,
      including edge-triangle ERGMs using Chatterjee's exchangeable-pair framework and Glauber
      dynamics. Currently investigating CLTs for the global magnetization under broad structural
      assumptions on the interaction tensor.

  - year: 2026
    title: "Conditional Limit Theorems for Drifted Brownian Motion under Restricted L²-Norm"
    supervisor: "Prof. Frank Aurzada (TU Darmstadt)"
    description: >
      Studying Brownian motion with drift conditioned to have an atypically small L² norm over a
      long time horizon, extending recent rare-event conditioning results. A manuscript describing
      these results is currently in preparation.


completed:

  - year: 2026
    title: "Projection-Based Filtering and Smoothing of Diffusion Processes"
    supervisor: "Prof. Heinz Koeppl (TU Darmstadt)"
    description: >
      Developed projection-based filtering and smoothing methods for diffusion processes using
      Gaussian, lognormal and independent gamma approximation families.

  - year: 2026
    title: "Bivariate Inverse Gaussian Degradation Processes with Shared Random Effects and an Application to Fatigue Cracks"
    supervisor: "Prof. Sandip Barui, Prof. Debanjan Mitra, Prof. Narayanaswamy Balakrishnan"
    description: >
      Developed a bivariate degradation framework based on inverse Gaussian processes with shared
      random effects and applied the methodology to fatigue crack data.

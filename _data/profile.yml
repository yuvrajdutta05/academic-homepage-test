short_bio: >-
short_bio: >-
  <p>
    I am a final-year M.Stat student at the Indian Statistical Institute, Kolkata, specializing in Probability. Prior to that, I completed my B.Stat (Hons.) in 2025 from the same institute. My Master’s dissertation, supervised by Prof. Sumit Mukherjee (Columbia University), focuses on Asymptotic Fluctuations in Cubic Interaction Spin Models. In parallel, I am working with Prof. Frank Aurzada (Technische Universität, Darmstadt) on Brownian motions with drift conditioned to have restricted L2-norm.
  </p>

  <p>
  I have been fortunate to pursue a research internship at the Probability Group, Maths Department, TU Darmstadt (On-site, Summer 2026), advised by Dr. Frank Aurzada. Prior to that, I visited the Self-Organizing Systems Lab, TU Darmstadt (Summer 2025).
  </p>


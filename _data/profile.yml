research_interests: My research interests lie broadly in probability theory and theoretical statistics. I am particularly interested in stochastic processes, probabilistic modeling, and the behavior of complex random systems. I am also interested in statistical inference for dynamic and latent-variable models, as well as Bayesian approaches to modeling uncertainty. More generally, I am drawn to questions at the interface of probability and statistics, including graphical models, interacting systems, and probabilistic structures motivated by applications in the natural sciences.



